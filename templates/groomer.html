<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='groomer.css') }}">
</head>

<body>
    <div class="all">
        <div class="title">
            <h1>
                Appointments
            </h1>
        </div>

        <div>
            <label for="groomer"></label>
            <select name="groomer" id="groomer" required onchange="fetchAppointments()">
                <option value="" disabled selected>Select Groomer</option>
                {% for g in groomers %}
                <option value="{{g.groomer_id}}">{{g.groomer_name}}</option>
                {% endfor %}
            </select>
        </div>
        <br>
        <div id="appointments">
            <!-- <p>No Appointments</p> -->
            <!-- <div class="container">
                <div>
                    Date:
                </div>
                <div>
                    Time:
                </div>
                <div>
                    Parent:
                </div>
                <div>
                    Phone Number:
                </div>
                <div>
                    Dog:
                </div>
                <div>
                    Service:
                </div>
            </div>   -->
        </div>
    </div>

    <script>
        function fetchAppointments() {
            const groomerId = document.getElementById("groomer").value
            const appointmentDiv = document.getElementById("appointments")
            fetch(`/groomer-appointments?groomer_id=${groomerId}`)
            .then(r => r.json()) 
            .then(data => {
                if (data.length === 0){
                    appointmentDiv.innerHTML='<p>No Appointments</p>';
                }else{
                    // console.log(data);
                    appointmentDiv.innerHTML='';
                    data.forEach(a => {
                        const element = document.createElement("div");
                        element.className="container";
                        element.innerHTML=`
                            <div>Date: ${a.appointment_date}</div>
                            <div>Time: ${a.start_time}</div>
                            <div>Parent: ${a.parent_name}</div>
                            <div>Phone Number: ${a.phone}</div>
                            <div>Dog: ${a.dog_name}</div>
                            <div>Service: ${a.service_name} </div>
                        `;
                        appointmentDiv.appendChild(element);
                    });
                }
            })
        }
        
    </script>
</body>

</html>
